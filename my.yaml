proxy-groups:
  - name: Proxy
    type: select
    include-all: true

  - name: Final
    type: select
    proxies:
      - Proxy
      - DIRECT

  - name: VRChat
    type: select
    proxies:
      - Proxy
      - DIRECT
      - HK
      - JP

  - name: Bilibili
    type: select
    proxies:
      - DIRECT
      - HK
      - TW

  - name: SteamCN
    type: select
    proxies:
      - DIRECT
      - HK

  - name: Steam
    type: select
    proxies:
      - HK
      - DIRECT

  - name: Wise
    type: select
    proxies:
      - CA

  - name: PayPal
    type: select
    proxies:
      - UK
      - US
      - HK
      - DIRECT

  - name: BBC
    type: select
    proxies:
      - UK

  - name: Discord
    type: select
    proxies:
      - US
      - JP

  - name: Twitch
    type: select
    proxies:
      - HK
      - JP
      - REJECT

  - name: Telegram
    type: select
    proxies:
      - SG
      - US
      - NL

  - name: Twitter
    type: select
    proxies:
      - JP
      - US
      - UK
      - FR

  - name: Bahamut
    type: select
    proxies:
      - TW
      - HK

  - name: Netflix
    type: select
    proxies:
      - SG
      - HK
      - JP
      - TW

  - name: Claude
    type: select
    include-all: true
    filter: '(?=.*(🇺🇸|US\d+|美国))(?=.*(星链|蜂窝|家宽|谷歌|UDPN))'
    proxies:
      - US

  - name: OpenAI
    type: select
    include-all: true
    filter: '(?=.*(🇺🇸|US\d+|美国))(?=.*(星链|蜂窝|家宽|谷歌|UDPN))'
    proxies:
      - US

  - name: Google
    type: select
    proxies:
      - US
      - HK
      - JP
      - SG
      - UK
      - TR
      - NL
      - FR

  - name: Microsoft
    type: select
    proxies:
      - HK
      - DIRECT
      - JP

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - JP
      - HK
      - US
      - UK
      - TR

  - name: US
    type: select
    include-all: true
    filter: '(🇺🇸|美国|(United States)|US\d+)'

  - name: UK
    type: select
    include-all: true
    filter: '(🇬🇧|英国|(United Kingdom)|UK\d+)'

  - name: NL
    type: select
    include-all: true
    filter: '(🇳🇱|荷兰|Netherlands|NL\d+)'

  - name: TR
    type: select
    include-all: true
    filter: '(🇹🇷|土耳其|Turkey|TR\d+|Türkiye)'

  - name: FR
    type: select
    include-all: true
    filter: '(🇫🇷|法国|France|FR\d+)'

  - name: HK
    type: select
    include-all: true
    filter: '(🇭🇰|香港|(Hong Kong)|HK\d+)'

  - name: JP
    type: select
    include-all: true
    filter: '(🇯🇵|日本|Japan|JP\d+)'

  - name: TW
    type: select
    include-all: true
    filter: '(🇨🇳|🇹🇼|台湾|Taiwan|TW\d+)'

  - name: SG
    type: select
    include-all: true
    filter: '(🇸🇬|新加坡|Singapore|SG\d+)'

  - name: CA
    type: select
    include-all: true
    filter: '(🇨🇦|加拿大|Canada|CA\d+)'

